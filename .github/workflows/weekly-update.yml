name: Weekly Advocate Map Refresh

on:
  schedule:
    - cron: "0 13 * * 1"   # Every Monday 9am ET (1pm UTC)
  workflow_dispatch:         # Manual trigger from GitHub Actions tab

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests beautifulsoup4 lxml

      - name: Run update script
        env:
          HUBSPOT_TOKEN:  ${{ secrets.HUBSPOT_TOKEN }}
          INTERCOM_TOKEN: ${{ secrets.INTERCOM_TOKEN }}
          SLACK_WEBHOOK:  ${{ secrets.SLACK_WEBHOOK }}
        run: python update_advocates.py

      - name: Commit updated data if changed
        run: |
          git config user.name  "advocate-bot"
          git config user.email "bot@digitail.io"
          git diff --quiet advocates.json || (
            git add advocates.json &&
            git commit -m "data: weekly advocate refresh $(date +%Y-%m-%d)" &&
            git push
          )
