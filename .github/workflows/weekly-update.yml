name: Daily Advocate Map Refresh

on:
  schedule:
    - cron: "0 13 * * *"   # Every day 9am ET-ish / 1pm UTC
  workflow_dispatch:       # Manual trigger from GitHub Actions tab

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests beautifulsoup4 lxml

      - name: Run update script
        env:
          HUBSPOT_TOKEN:        ${{ secrets.HUBSPOT_TOKEN }}
          INTERCOM_TOKEN:       ${{ secrets.INTERCOM_TOKEN }}
          SLACK_WEBHOOK:        ${{ secrets.SLACK_WEBHOOK }}
          SLACK_BOT_TOKEN:      ${{ secrets.SLACK_BOT_TOKEN }}
          FATHOM_API_KEY:       ${{ secrets.FATHOM_API_KEY }}
          FATHOM_CS_EMAILS:     ${{ secrets.FATHOM_CS_EMAILS }}
          GOOGLE_API_KEY:       ${{ secrets.GOOGLE_API_KEY }}
          GOOGLE_CSE_ID:        ${{ secrets.GOOGLE_CSE_ID }}
          GOOGLE_PLACE_ID:      ${{ secrets.GOOGLE_PLACE_ID }}
          FACEBOOK_PAGE_TOKEN:  ${{ secrets.FACEBOOK_PAGE_TOKEN }}
          REDDIT_CLIENT_ID:     ${{ secrets.REDDIT_CLIENT_ID }}
          REDDIT_CLIENT_SECRET: ${{ secrets.REDDIT_CLIENT_SECRET }}
        run: python update_advocates.py

      - name: Commit updated data if changed
        run: |
          git config user.name  "advocate-bot"
          git config user.email "bot@digitail.io"
          git diff --quiet advocates.json || (
            git add advocates.json &&
            git commit -m "data: daily advocate refresh $(date +%Y-%m-%d)" &&
            git push
          )
