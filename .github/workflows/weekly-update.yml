name: Weekly Advocate Map Refresh

on:
  schedule:
    - cron: "0 13 * * 1"   # Every Monday 9am ET (1pm UTC)
  workflow_dispatch:         # Also triggerable manually from GitHub UI

permissions:
  contents: write            # Needed to commit advocates.json back to the repo

jobs:
  refresh:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests

      - name: Run update script
        id: update
        env:
          HUBSPOT_TOKEN:  ${{ secrets.HUBSPOT_TOKEN }}
          INTERCOM_TOKEN: ${{ secrets.INTERCOM_TOKEN }}
          SLACK_WEBHOOK:  ${{ secrets.SLACK_WEBHOOK }}
        run: |
          python update_advocates.py
          echo "exit_code=$?" >> $GITHUB_OUTPUT

      - name: Commit updated data if changed
        run: |
          git config user.name  "advocate-bot"
          git config user.email "bot@digitail.io"
          git diff --quiet advocates.json || (
            git add advocates.json &&
            git commit -m "data: weekly advocate refresh $(date +%Y-%m-%d)" &&
            git push
          )
        # git push → Netlify detects the commit → auto-redeploys (free tier ✓)
